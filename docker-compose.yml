version: '3.9'

services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_server
    environment:
      SA_PASSWORD: "Qies$12!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"

  auth_service:
    build: ./auth_service
    ports:
      - "8001:8000"
    depends_on:
      - db

  calculator_service:
    build: ./calculator_service
    ports:
      - "8002:8000"
    depends_on:
      - db